<div class="game-container">
  <div class="status-panel">
    <p class="message" [class.victory]="vittoria()">{{ messaggioPartita() }}</p>

    @if (partitaConclusa()) {
      <button class="btn-restart" (click)="iniziaNuovaPartita()">Gioca un'altra partita</button>
    }
  </div>

  @if (idPartita() && !partitaConclusa()) {
    <div class="controls-panel">
      <input
        type="text"
        class="guess-input"
        [formControl]="controlloTentativo"
        placeholder="Scrivi una parola o il titolo..."
        (keyup.enter)="tentativo(false)"
      />
      <div class="controls-buttons">
        <button class="btn-guess" (click)="tentativo(false)">Indovina Parola</button>
        <button class="btn-title" (click)="tentativo(true)">Tenta il Titolo!</button>
        <button class="btn-abandon" (click)="abbandona()">Abbandona</button>
      </div>
    </div>
  }

  <div class="article-container">
    <p class="wiki-text">{{ testoCensurato() }}</p>
  </div>
</div>
