<div class="contenitore-partita">
  <div class="pannello-stato">
    <p class="messaggio" [class.vittoria]="vittoria()">{{ messaggioPartita() }}</p>

    @if (partitaConclusa()) {
      <button class="btn-ricomincia" (click)="iniziaNuovaPartita()">Gioca un'altra partita</button>
    }
  </div>

  @if (idPartita() && !partitaConclusa()) {
    <div class="pannello-controlli">
      <input
        type="text"
        class="input-tentativo"
        [formControl]="controlloTentativo"
        placeholder="Scrivi una parola o il titolo..."
        (keyup.enter)="tentativo(false)"
      />
      <div class="pulsanti-controlli">
        <button class="btn-tentativo" (click)="tentativo(false)">Indovina Parola</button>
        <button class="btn-titolo" (click)="tentativo(true)">Tenta il Titolo!</button>
        <button class="btn-abbandona" (click)="abbandona()">Abbandona</button>
      </div>
    </div>
  }

  <div class="contenitore-articolo">
    <p class="testo-wiki">{{ testoCensurato() }}</p>
  </div>
</div>
