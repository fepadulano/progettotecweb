<nav class="nav-principale">
  <a class="marchio" routerLink="/home">
    <span class="simbolo-marchio">W</span>
    WikiBlank
  </a>

  <div class="link-nav">
    <a routerLink="/home" routerLinkActive="attivo" [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    <a routerLink="/classifica" routerLinkActive="attivo">Classifica</a>
    <a routerLink="/storico" routerLinkActive="attivo">Storico</a>
    @if (servizioAuth.isAuthenticated()) {
      <a routerLink="/game" routerLinkActive="attivo">Gioca</a>
    }
  </div>

  <div class="nav-autenticazione">
    @if (servizioAuth.isAuthenticated()) {

    } @else {
      <a class="btn-nav-collegamento" routerLink="/login" routerLinkActive="attivo">Accedi</a>
